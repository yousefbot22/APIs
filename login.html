<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOJI APIs | Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', 'Segoe UI', sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050c);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}

/* Animated Background */
.bg-shape {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  animation: float 10s ease-in-out infinite;
}

.shape1 {
  background: #00ffaa;
  top: -150px;
  left: -150px;
  opacity: 0.3;
}

.shape2 {
  background: #4f7cff;
  bottom: -150px;
  right: -150px;
  opacity: 0.3;
  animation-delay: -5s;
}

.shape3 {
  background: #ff44aa;
  top: 50%;
  left: 50%;
  width: 300px;
  height: 300px;
  opacity: 0.2;
  animation-duration: 15s;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(50px, -50px) scale(1.1); }
}

/* Main Card */
.login-container {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 450px;
  padding: 20px;
}

.login-card {
  background: rgba(10, 15, 31, 0.7);
  backdrop-filter: blur(20px);
  border-radius: 32px;
  padding: 48px 40px;
  border: 1px solid rgba(0, 255, 170, 0.2);
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  transition: all 0.3s ease;
}

.login-card:hover {
  border-color: rgba(0, 255, 170, 0.5);
  box-shadow: 0 0 40px rgba(0, 255, 170, 0.1);
}

/* Logo */
.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo h1 {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #00ffaa, #4f7cff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}

.logo p {
  color: #8b9bb0;
  font-size: 14px;
  margin-top: 8px;
}

/* Input Groups */
.input-group {
  margin-bottom: 24px;
}

.input-group label {
  display: block;
  margin-bottom: 8px;
  color: #cbd5e1;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.input-group input {
  width: 100%;
  padding: 14px 18px;
  background: rgba(20, 27, 45, 0.8);
  border: 1.5px solid rgba(0, 255, 170, 0.2);
  border-radius: 16px;
  color: white;
  font-size: 15px;
  transition: all 0.3s ease;
  outline: none;
}

.input-group input:focus {
  border-color: #00ffaa;
  box-shadow: 0 0 20px rgba(0, 255, 170, 0.2);
  background: rgba(20, 27, 45, 1);
}

.password-wrapper {
  position: relative;
}

.password-wrapper input {
  padding-right: 70px;
}

.toggle-password {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #00ffaa;
  font-size: 12px;
  font-weight: 600;
  background: rgba(0, 255, 170, 0.1);
  padding: 5px 12px;
  border-radius: 20px;
  transition: 0.2s;
}

.toggle-password:hover {
  background: rgba(0, 255, 170, 0.2);
}

/* Options */
.options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  font-size: 13px;
}

.remember {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #8b9bb0;
  cursor: pointer;
}

.remember input {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: #00ffaa;
}

.forgot {
  color: #00ffaa;
  text-decoration: none;
  transition: 0.2s;
  cursor: pointer;
}

.forgot:hover {
  text-shadow: 0 0 8px #00ffaa;
}

/* Login Button */
.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #00ffaa, #4f7cff);
  border: none;
  border-radius: 16px;
  color: #03050c;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0, 255, 170, 0.3);
}

.login-btn:active {
  transform: translateY(0);
}

.login-btn.loading {
  opacity: 0.7;
  cursor: wait;
  transform: none;
}

/* Register Link */
.register-link {
  text-align: center;
  margin-top: 28px;
  color: #8b9bb0;
  font-size: 14px;
}

.register-link a {
  color: #00ffaa;
  text-decoration: none;
  font-weight: 600;
  margin-left: 5px;
  cursor: pointer;
}

.register-link a:hover {
  text-decoration: underline;
}

/* Message */
.message {
  margin-top: 20px;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  display: none;
  text-align: center;
}

.message.error {
  background: rgba(255, 77, 77, 0.15);
  color: #ff8080;
  border: 1px solid rgba(255, 77, 77, 0.3);
  display: block;
}

.message.success {
  background: rgba(0, 255, 170, 0.15);
  color: #6bffd6;
  border: 1px solid rgba(0, 255, 170, 0.3);
  display: block;
}

/* Responsive */
@media (max-width: 480px) {
  .login-card {
    padding: 32px 24px;
  }
  
  .logo h1 {
    font-size: 28px;
  }
  
  .options {
    flex-direction: column;
    gap: 12px;
    align-items: flex-start;
  }
}
</style>
</head>
<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>
<div class="bg-shape shape3"></div>

<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <h1>TOJI APIs</h1>
      <p>Welcome back • Sign in to continue</p>
    </div>

    <div class="input-group">
      <label>📧 Email Address</label>
      <input type="email" id="email" placeholder="hello@toji.com">
    </div>

    <div class="input-group">
      <label>🔒 Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter your password">
        <span class="toggle-password" id="togglePassBtn">Show</span>
      </div>
    </div>

    <div class="options">
      <label class="remember">
        <input type="checkbox" id="remember"> Remember me
      </label>
      <a href="#" class="forgot" id="forgotBtn">Forgot password?</a>
    </div>

    <button class="login-btn" id="loginBtn">Login</button>

    <div id="message" class="message"></div>

    <div class="register-link">
      Don't have an account?
      <a href="#" id="registerBtn">Create account</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
// Initialize Supabase
const supabase = supabase.createClient(
  "https://rcxjwetrmtwxkdqdurfw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjeGp3ZXRybXR3eGtkcWR1cmZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDMyNzQsImV4cCI6MjA4ODQxOTI3NH0.WXzfjufXlpeHPZhNBiSShNd19eRNf_CtTrnMj7CNnf8"
);

// DOM Elements
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const messageDiv = document.getElementById('message');
const rememberCheckbox = document.getElementById('remember');
const togglePassBtn = document.getElementById('togglePassBtn');
const forgotBtn = document.getElementById('forgotBtn');
const registerBtn = document.getElementById('registerBtn');

// Toggle Password Function
function togglePassword() {
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    togglePassBtn.textContent = 'Hide';
  } else {
    passwordInput.type = 'password';
    togglePassBtn.textContent = 'Show';
  }
}

// Handle Login Function
async function handleLogin() {
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  // Hide previous message
  messageDiv.className = 'message';
  messageDiv.style.display = 'none';

  // Validation
  if (!email || !password) {
    messageDiv.className = 'message error';
    messageDiv.textContent = '❌ Please enter email and password';
    messageDiv.style.display = 'block';
    return;
  }

  // Email validation
  const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
  if (!emailRegex.test(email)) {
    messageDiv.className = 'message error';
    messageDiv.textContent = '❌ Invalid email format';
    messageDiv.style.display = 'block';
    return;
  }

  // Loading state
  loginBtn.classList.add('loading');
  loginBtn.textContent = 'Logging in...';

  try {
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      messageDiv.className = 'message error';
      if (error.message.includes('Invalid login credentials')) {
        messageDiv.textContent = '❌ Wrong email or password';
      } else if (error.message.includes('Email not confirmed')) {
        messageDiv.textContent = '❌ Please confirm your email first';
      } else {
        messageDiv.textContent = '❌ ' + error.message;
      }
      messageDiv.style.display = 'block';
      loginBtn.classList.remove('loading');
      loginBtn.textContent = 'Login';
    } else {
      // Save session
      localStorage.setItem('user', 'true');
      localStorage.setItem('email', email);
      
      if (rememberCheckbox.checked) {
        localStorage.setItem('rememberEmail', email);
      } else {
        localStorage.removeItem('rememberEmail');
      }

      messageDiv.className = 'message success';
      messageDiv.textContent = '✅ Login successful! Redirecting...';
      messageDiv.style.display = 'block';

      // Redirect to loading page
      setTimeout(() => {
        window.location.href = 'loading.html';
      }, 1200);
    }
  } catch (err) {
    messageDiv.className = 'message error';
    messageDiv.textContent = '❌ Something went wrong. Try again.';
    messageDiv.style.display = 'block';
    loginBtn.classList.remove('loading');
    loginBtn.textContent = 'Login';
  }
}

// Forgot Password
function handleForgot() {
  alert('📧 Password reset link will be sent to your email address');
}

// Register
function handleRegister() {
  alert('📝 Registration page coming soon!');
}

// Load remembered email
function loadRememberedEmail() {
  const savedEmail = localStorage.getItem('rememberEmail');
  if (savedEmail) {
    emailInput.value = savedEmail;
    rememberCheckbox.checked = true;
  }
}

// Add Event Listeners
loginBtn.addEventListener('click', handleLogin);
togglePassBtn.addEventListener('click', togglePassword);
forgotBtn.addEventListener('click', handleForgot);
registerBtn.addEventListener('click', handleRegister);

// Enter key support
passwordInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') handleLogin();
});
emailInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') handleLogin();
});

// Load saved data on page load
window.addEventListener('DOMContentLoaded', loadRememberedEmail);
</script>
</body>
</html>
