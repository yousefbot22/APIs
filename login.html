<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | TOJI APIs</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,Arial; }

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:#070b14;
  color:white;
  position:relative;
}

/* Background Grid */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:
    linear-gradient(90deg, transparent 98%, rgba(0,255,170,0.1) 100%),
    linear-gradient(180deg, transparent 98%, rgba(0,255,170,0.08) 100%);
  background-size:60px 60px;
  animation:gridMove 20s linear infinite;
}
@keyframes gridMove{
  0%{transform:translate(0,0);}
  100%{transform:translate(-250px,-250px);}
}

/* Glow Lights */
.light{
  position:absolute;
  width:600px;
  height:600px;
  border-radius:50%;
  filter:blur(180px);
  opacity:0.25;
  animation: glowPulse 6s ease-in-out infinite;
}
.light1{ background:#00ffaa; top:-150px; left:-150px; }
.light2{ background:#4f7cff; bottom:-160px; right:-160px; }
@keyframes glowPulse{
  0%,100%{opacity:0.2; transform:scale(1);}
  50%{opacity:0.35; transform:scale(1.15);}
}

/* Glass Card */
.card{
  position:relative;
  z-index:2;
  width:100%;
  max-width:420px;
  padding:60px 40px;
  border-radius:25px;
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(30px) saturate(220%);
  -webkit-backdrop-filter: blur(30px) saturate(220%);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 0 50px rgba(0,255,170,0.3);
  text-align:center;
  animation: cardGlow 2.5s infinite alternate;
  transition:0.3s ease;
}
.card:hover{
  box-shadow: 0 0 80px #00ffaa, 0 0 160px #00c3ff;
  transform: translateY(-6px);
}
@keyframes cardGlow{
  0%{box-shadow:0 0 30px #00ffaa,0 0 60px #00c3ff;}
  100%{box-shadow:0 0 60px #00ffaa,0 0 120px #00c3ff;}
}

h1{ margin-bottom:12px; font-size:30px; letter-spacing:1px;}
.subtitle{ opacity:0.7; margin-bottom:35px; font-size:16px; }

/* Input Fields */
.input-box{ position:relative; margin-top:20px; }
.input-box input{
  width:100%;
  padding:16px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.02);
  color:white;
  outline:none;
  transition:0.3s ease;
  backdrop-filter: blur(15px);
  font-size:15px;
}
.input-box input:focus{
  border:1px solid #00ffaa;
  box-shadow:0 0 20px #00ffaa;
}
.show{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:14px;
  color:#00ffaa;
  user-select:none;
}

/* Button */
button{
  position:relative;
  overflow:hidden;
  width:100%;
  padding:16px;
  margin-top:28px;
  border:none;
  border-radius:15px;
  background: linear-gradient(135deg, rgba(0,255,170,0.3), rgba(0,195,255,0.3));
  backdrop-filter: blur(15px);
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s ease;
}
button:hover{
  box-shadow:0 0 30px #00ffaa, 0 0 60px #00c3ff;
  transform:translateY(-3px);
}
button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}
button:disabled:hover{
  transform:none;
  box-shadow:none;
}

/* Messages */
#msg{
  margin-top:20px;
  padding:14px;
  border-radius:12px;
  font-size:14px;
  display:none;
}
.msg-error{ background:#ff4d4d33; color:#ff8080; border:1px solid #ff4d4d; }
.msg-success{ background:#00ffaa33; color:#6bffd6; border:1px solid #00ffaa; }

/* Switch */
.switch{ margin-top:25px; font-size:14px; }
.switch a{ color:#00ffaa; text-decoration:none; transition:0.2s; }
.switch a:hover{ text-shadow:0 0 8px #00ffaa; }

/* Loading spinner inside button */
.loader-spinner{
  display:inline-block;
  width:18px;
  height:18px;
  border:2px solid #fff;
  border-top-color:transparent;
  border-radius:50%;
  animation:spin 0.6s linear infinite;
  margin-right:8px;
  vertical-align:middle;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div class="light light1"></div>
<div class="light light2"></div>

<div class="card">
<h1>مرحباً بك</h1>
<p class="subtitle">سجل دخولك إلى TOJI APIs</p>

<div class="input-box">
  <input id="email" type="email" placeholder="البريد الإلكتروني" autocomplete="email">
</div>

<div class="input-box">
  <input id="password" type="password" placeholder="كلمة المرور">
  <span class="show" onclick="togglePass()">إظهار</span>
</div>

<div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
  <label style="font-size:13px; color:#9ca3af; cursor:pointer;">
    <input type="checkbox" id="rememberMe" style="margin-left:5px; cursor:pointer;"> تذكرني
  </label>
  <a href="#" onclick="alert('سيتم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك')" style="color:#00ffaa; font-size:13px;">نسيت كلمة المرور؟</a>
</div>

<button id="loginBtn" onclick="login()">تسجيل الدخول</button>
<div id="msg"></div>

<p class="switch">
ليس لديك حساب؟
<a href="#" onclick="alert('سيتم تفعيل التسجيل قريباً')">إنشاء حساب</a>
</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabaseClient = supabase.createClient(
  "https://rcxjwetrmtwxkdqdurfw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjeGp3ZXRybXR3eGtkcWR1cmZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDMyNzQsImV4cCI6MjA4ODQxOTI3NH0.WXzfjufXlpeHPZhNBiSShNd19eRNf_CtTrnMj7CNnf8"
);

function togglePass(){
  let pass = document.getElementById("password");
  let showSpan = document.querySelector(".show");
  if(pass.type === "password"){
    pass.type = "text";
    showSpan.textContent = "إخفاء";
  } else {
    pass.type = "password";
    showSpan.textContent = "إظهار";
  }
}

// تحميل البريد الإلكتروني إذا كان "تذكرني" مفعل
window.onload = function(){
  let savedEmail = localStorage.getItem("rememberEmail");
  if(savedEmail){
    document.getElementById("email").value = savedEmail;
    document.getElementById("rememberMe").checked = true;
  }
}

async function login(){
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();
  let msg = document.getElementById("msg");
  let loginBtn = document.getElementById("loginBtn");
  
  // إخفاء أي رسالة سابقة
  msg.style.display = "none";
  
  // التحقق من الحقول
  if(email == "" || password == ""){
    msg.style.display = "block";
    msg.className = "msg-error";
    msg.innerText = "❌ الرجاء إدخال البريد الإلكتروني وكلمة المرور";
    return;
  }
  
  // التحقق من صيغة البريد
  let emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
  if(!emailRegex.test(email)){
    msg.style.display = "block";
    msg.className = "msg-error";
    msg.innerText = "❌ البريد الإلكتروني غير صالح";
    return;
  }
  
  // تعطيل الزر أثناء التحميل
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<span class="loader-spinner"></span> جاري التسجيل...';
  
  try {
    let { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });
    
    if(error){
      msg.style.display = "block";
      msg.className = "msg-error";
      if(error.message.includes("Invalid login credentials")){
        msg.innerText = "❌ البريد الإلكتروني أو كلمة المرور غير صحيحة";
      } else if(error.message.includes("Email not confirmed")){
        msg.innerText = "❌ الرجاء تأكيد بريدك الإلكتروني أولاً";
      } else {
        msg.innerText = "❌ " + error.message;
      }
      loginBtn.disabled = false;
      loginBtn.innerHTML = "تسجيل الدخول";
    } else {
      // حفظ الجلسة
      localStorage.setItem("user", "true");
      localStorage.setItem("email", email);
      
      // حفظ "تذكرني"
      if(document.getElementById("rememberMe").checked){
        localStorage.setItem("rememberEmail", email);
      } else {
        localStorage.removeItem("rememberEmail");
      }
      
      msg.style.display = "block";
      msg.className = "msg-success";
      msg.innerText = "✅ تم تسجيل الدخول بنجاح... جاري التحويل";
      
      // التحويل بعد ثانيتين
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1500);
    }
  } catch(err) {
    msg.style.display = "block";
    msg.className = "msg-error";
    msg.innerText = "❌ حدث خطأ، حاول مرة أخرى";
    loginBtn.disabled = false;
    loginBtn.innerHTML = "تسجيل الدخول";
  }
}

// الضغط على Enter
document.getElementById("password").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    login();
  }
});
document.getElementById("email").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    login();
  }
});
</script>
</body>
</html>
