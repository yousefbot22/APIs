<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOJI APIs | Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Poppins', sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050c);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.bg-shape {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  animation: float 10s ease-in-out infinite;
}

.shape1 {
  background: #00ffaa;
  top: -150px;
  left: -150px;
  opacity: 0.3;
}

.shape2 {
  background: #4f7cff;
  bottom: -150px;
  right: -150px;
  opacity: 0.3;
  animation-delay: -5s;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(50px, -50px) scale(1.1); }
}

.login-container {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 450px;
  padding: 20px;
}

.login-card {
  background: rgba(10, 15, 31, 0.7);
  backdrop-filter: blur(20px);
  border-radius: 32px;
  padding: 48px 40px;
  border: 1px solid rgba(0, 255, 170, 0.2);
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo h1 {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #00ffaa, #4f7cff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.logo p {
  color: #8b9bb0;
  font-size: 14px;
  margin-top: 8px;
}

.input-group {
  margin-bottom: 24px;
}

.input-group label {
  display: block;
  margin-bottom: 8px;
  color: #cbd5e1;
  font-size: 13px;
  font-weight: 500;
}

.input-group input {
  width: 100%;
  padding: 14px 18px;
  background: rgba(20, 27, 45, 0.8);
  border: 1.5px solid rgba(0, 255, 170, 0.2);
  border-radius: 16px;
  color: white;
  font-size: 15px;
  transition: all 0.3s ease;
  outline: none;
}

.input-group input:focus {
  border-color: #00ffaa;
  box-shadow: 0 0 20px rgba(0, 255, 170, 0.2);
}

.password-wrapper {
  position: relative;
}

.password-wrapper input {
  padding-right: 70px;
}

.toggle-password {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #00ffaa;
  font-size: 12px;
  font-weight: 600;
  background: rgba(0, 255, 170, 0.1);
  padding: 5px 12px;
  border-radius: 20px;
  border: none;
  transition: all 0.3s ease;
}

.toggle-password:hover {
  background: rgba(0, 255, 170, 0.2);
}

.options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  font-size: 13px;
}

.remember {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #8b9bb0;
  cursor: pointer;
}

.remember input {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: #00ffaa;
}

.forgot {
  color: #00ffaa;
  text-decoration: none;
  cursor: pointer;
  background: none;
  border: none;
  font-size: 13px;
  transition: all 0.3s ease;
}

.forgot:hover {
  color: #4f7cff;
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #00ffaa, #4f7cff);
  border: none;
  border-radius: 16px;
  color: #03050c;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}

.login-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0, 255, 170, 0.3);
}

.login-btn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

.register-link {
  text-align: center;
  margin-top: 28px;
  color: #8b9bb0;
  font-size: 14px;
}

.register-link a {
  color: #00ffaa;
  text-decoration: none;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.register-link a:hover {
  color: #4f7cff;
}

.message {
  margin-top: 20px;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  display: none;
  text-align: center;
}

.message.error {
  background: rgba(255, 77, 77, 0.15);
  color: #ff8080;
  border: 1px solid rgba(255, 77, 77, 0.3);
  display: block;
}

.message.success {
  background: rgba(0, 255, 170, 0.15);
  color: #6bffd6;
  border: 1px solid rgba(0, 255, 170, 0.3);
  display: block;
}

.message.info {
  background: rgba(79, 124, 255, 0.15);
  color: #8bb3ff;
  border: 1px solid rgba(79, 124, 255, 0.3);
  display: block;
}
</style>
</head>
<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <h1>TOJI APIs</h1>
      <p>Welcome back • Sign in to continue</p>
    </div>

    <div class="input-group">
      <label>📧 Email Address</label>
      <input type="email" id="email" placeholder="hello@toji.com" autocomplete="email">
    </div>

    <div class="input-group">
      <label>🔒 Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        <button type="button" class="toggle-password" id="toggleBtn">Show</button>
      </div>
    </div>

    <div class="options">
      <label class="remember">
        <input type="checkbox" id="remember"> Remember me
      </label>
      <button type="button" class="forgot" id="forgotBtn">Forgot password?</button>
    </div>

    <button type="button" class="login-btn" id="loginBtn">Login</button>

    <div id="message" class="message"></div>

    <div class="register-link">
      Don't have an account?
      <a href="#" id="registerBtn">Create account</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// تكوين Supabase - تأكد من استخدام المفتاح الكامل
const supabaseUrl = "https://rcxjwetrmtwxkdqdurfw.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjeGp3ZXRybXR3eGtkcWR1cmZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDY4NzIwMDAsImV4cCI6MjAyMjQ0ODAwMH0.UDiLhPVz8JNcGpC-mx2M3DqWqWqWqWqWqWqWqWqWqWq"; // ⚠️ استبدل هذا بمفتاح Supabase الكامل الخاص بك

let supabase;

try {
  supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
  console.log('Supabase initialized successfully');
} catch (error) {
  console.error('Failed to initialize Supabase:', error);
  showMessage('Configuration error. Please contact support.', 'error');
}

// العناصر
const emailField = document.getElementById('email');
const passwordField = document.getElementById('password');
const loginButton = document.getElementById('loginBtn');
const messageBox = document.getElementById('message');
const rememberBox = document.getElementById('remember');
const toggleBtn = document.getElementById('toggleBtn');
const forgotBtn = document.getElementById('forgotBtn');
const registerBtn = document.getElementById('registerBtn');

// دالة عرض الرسائل
function showMessage(text, type = 'error') {
  messageBox.className = `message ${type}`;
  messageBox.textContent = text;
  messageBox.style.display = 'block';
}

// دالة إخفاء الرسائل
function hideMessage() {
  messageBox.className = 'message';
  messageBox.style.display = 'none';
}

// تبديل إظهار/إخفاء كلمة المرور
toggleBtn.addEventListener('click', function() {
  const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
  passwordField.setAttribute('type', type);
  toggleBtn.textContent = type === 'password' ? 'Show' : 'Hide';
});

// نسيت كلمة المرور
forgotBtn.addEventListener('click', function() {
  const email = emailField.value.trim();
  if (!email) {
    showMessage('Please enter your email address first', 'info');
    emailField.focus();
    return;
  }
  showMessage('Password reset feature coming soon. Please contact support.', 'info');
});

// إنشاء حساب جديد
registerBtn.addEventListener('click', function(e) {
  e.preventDefault();
  showMessage('Registration feature coming soon!', 'info');
});

// تسجيل الدخول
loginButton.addEventListener('click', async function() {
  const email = emailField.value.trim();
  const password = passwordField.value.trim();

  hideMessage();

  // التحقق من وجود Supabase
  if (!supabase) {
    showMessage('System configuration error. Please refresh the page.', 'error');
    return;
  }

  // التحقق من المدخلات
  if (!email || !password) {
    showMessage('Please enter both email and password', 'error');
    if (!email) emailField.focus();
    else if (!password) passwordField.focus();
    return;
  }

  // التحقق من صحة البريد الإلكتروني
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    showMessage('Please enter a valid email address', 'error');
    emailField.focus();
    return;
  }

  // تعطيل الزر أثناء المعالجة
  loginButton.textContent = 'Logging in...';
  loginButton.disabled = true;

  try {
    console.log('Attempting login for:', email);
    
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      console.error('Login error:', error);
      
      // رسائل خطأ مخصصة
      let errorMessage = 'Login failed. ';
      if (error.message.includes('Invalid login credentials')) {
        errorMessage = 'Invalid email or password. Please try again.';
      } else if (error.message.includes('Email not confirmed')) {
        errorMessage = 'Please confirm your email address first.';
      } else if (error.message.includes('rate limit')) {
        errorMessage = 'Too many attempts. Please try again later.';
      } else {
        errorMessage += error.message;
      }
      
      showMessage(errorMessage, 'error');
      loginButton.textContent = 'Login';
      loginButton.disabled = false;
      return;
    }

    // نجاح تسجيل الدخول
    console.log('Login successful:', data);
    
    // حفظ بيانات المستخدم
    localStorage.setItem('user', JSON.stringify(data.user));
    localStorage.setItem('session', JSON.stringify(data.session));
    localStorage.setItem('email', email);

    // حفظ البريد الإلكتروني إذا تم اختيار "تذكرني"
    if (rememberBox.checked) {
      localStorage.setItem('rememberEmail', email);
    } else {
      localStorage.removeItem('rememberEmail');
    }

    showMessage('✅ Login successful! Redirecting...', 'success');

    // التوجيه بعد نجاح تسجيل الدخول
    setTimeout(() => {
      window.location.href = "loading.html";
    }, 1500);

  } catch (err) {
    console.error('Network error:', err);
    
    let errorMessage = 'Connection failed. ';
    if (err.message.includes('Failed to fetch')) {
      errorMessage = 'Cannot connect to authentication server. Please check your internet connection and try again.';
    } else if (err.message.includes('NetworkError')) {
      errorMessage = 'Network error. Please check your connection.';
    } else {
      errorMessage += err.message;
    }
    
    showMessage(errorMessage, 'error');
    loginButton.textContent = 'Login';
    loginButton.disabled = false;
  }
});

// السماح بالضغط على Enter لتسجيل الدخول
passwordField.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    loginButton.click();
  }
});

emailField.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    passwordField.focus();
  }
});

// استعادة البريد الإلكتروني المحفوظ
const savedEmail = localStorage.getItem('rememberEmail');
if (savedEmail) {
  emailField.value = savedEmail;
  rememberBox.checked = true;
}

// التحقق من وجود جلسة نشطة
async function checkExistingSession() {
  if (!supabase) return;
  
  try {
    const { data: { session }, error } = await supabase.auth.getSession();
    if (session && !error) {
      console.log('Existing session found');
      // إذا كان هناك جلسة نشطة، يمكن التوجيه مباشرة
      // window.location.href = "loading.html";
    }
  } catch (error) {
    console.log('No existing session');
  }
}

// التحقق من الجلسة عند التحميل
checkExistingSession();
</script>
</body>
</html>
