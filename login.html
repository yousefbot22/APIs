<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#070b14;
color:white;
}

/* hacker grid background */

body::before{

content:"";
position:absolute;
width:200%;
height:200%;

background:
linear-gradient(90deg, transparent 98%, rgba(0,255,170,0.1) 100%),
linear-gradient(180deg, transparent 98%, rgba(0,255,170,0.08) 100%);

background-size:60px 60px;

animation:gridMove 25s linear infinite;

}

@keyframes gridMove{

0%{transform:translate(0,0);}
100%{transform:translate(-200px,-200px);}

}

/* glow lights */

.light{

position:absolute;
width:400px;
height:400px;
border-radius:50%;
filter:blur(140px);
opacity:0.25;

}

.light1{
background:#00ffaa;
top:-100px;
left:-100px;
}

.light2{
background:#4f7cff;
bottom:-120px;
right:-120px;
}

/* card */

.card{

position:relative;
z-index:2;

width:100%;
max-width:380px;

padding:40px;

border-radius:18px;

background:rgba(10,14,25,0.85);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.08);

box-shadow:0 0 40px rgba(0,0,0,0.7);

text-align:center;

}

h1{
margin-bottom:10px;
}

.subtitle{
opacity:0.7;
margin-bottom:25px;
}

.input-box{
position:relative;
margin-top:15px;
}

.input-box input{

width:100%;
padding:14px;

border-radius:10px;
border:1px solid rgba(255,255,255,0.15);

background:#0f172a;

color:white;

outline:none;
transition:0.2s;

}

.input-box input:focus{

border:1px solid #00ffaa;
box-shadow:0 0 8px #00ffaa;

}

.show{

position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:13px;
color:#00ffaa;

}

button{

width:100%;
padding:14px;

margin-top:20px;

border:none;
border-radius:10px;

background:linear-gradient(90deg,#00ffaa,#00c3ff);

color:#001018;

font-size:16px;
font-weight:bold;

cursor:pointer;
transition:0.2s;

}

button:hover{

box-shadow:0 0 15px #00ffaa;
transform:translateY(-2px);

}

#msg{

margin-top:15px;
padding:10px;
border-radius:8px;
font-size:14px;
display:none;

}

.msg-error{
background:#ff4d4d33;
color:#ff8080;
}

.msg-success{
background:#00ffaa33;
color:#6bffd6;
}

.switch{
margin-top:18px;
font-size:14px;
}

.switch a{
color:#00ffaa;
text-decoration:none;
}

</style>

</head>

<body>

<div class="light light1"></div>
<div class="light light2"></div>

<div class="card">

<h1>Welcome Back</h1>
<p class="subtitle">Login to your account</p>

<div class="input-box">
<input id="email" placeholder="Email">
</div>

<div class="input-box">
<input id="password" type="password" placeholder="Password">
<span class="show" onclick="togglePass()">Show</span>
</div>

<button onclick="login()">Login</button>

<div id="msg"></div>

<p class="switch">
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseClient = supabase.createClient(
"https://rcxjwetrmtwxkdqdurfw.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjeGp3ZXRybXR3eGtkcWR1cmZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDMyNzQsImV4cCI6MjA4ODQxOTI3NH0.WXzfjufXlpeHPZhNBiSShNd19eRNf_CtTrnMj7CNnf8"
)

function togglePass(){

let pass=document.getElementById("password")
pass.type = pass.type==="password" ? "text" : "password"

}

async function login(){

let email=document.getElementById("email").value.trim()
let password=document.getElementById("password").value.trim()
let msg=document.getElementById("msg")

if(email=="" || password==""){

msg.style.display="block"
msg.className="msg-error"
msg.innerText="Enter email and password"
return

}

let {data,error}=await supabaseClient.auth.signInWithPassword({
email:email,
password:password
})

if(error){

msg.style.display="block"
msg.className="msg-error"
msg.innerText=error.message

}else{

localStorage.setItem("user","true")
localStorage.setItem("email",email)

msg.style.display="block"
msg.className="msg-success"
msg.innerText="Login successful..."

setTimeout(()=>{
window.location="loading.html"
},1000)

}

}

</script>

</body>
</html>
