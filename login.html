<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Ultra Glass</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,Arial; }

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:#070b14;
  color:white;
  position:relative;
}

/* Hacker Grid Background */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:
    linear-gradient(90deg, transparent 98%, rgba(0,255,170,0.1) 100%),
    linear-gradient(180deg, transparent 98%, rgba(0,255,170,0.08) 100%);
  background-size:60px 60px;
  animation:gridMove 20s linear infinite;
}
@keyframes gridMove{
  0%{transform:translate(0,0);}
  100%{transform:translate(-250px,-250px);}
}

/* Neon Glow Lights */
.light{
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  filter:blur(180px);
  opacity:0.25;
  animation: glowPulse 6s ease-in-out infinite;
}
.light1{ background:#00ffaa; top:-120px; left:-120px; }
.light2{ background:#4f7cff; bottom:-140px; right:-140px; }
@keyframes glowPulse{
  0%,100%{opacity:0.2; transform:scale(1);}
  50%{opacity:0.35; transform:scale(1.1);}
}

/* Glass Card */
.card{
  position:relative;
  z-index:2;
  width:100%;
  max-width:400px;
  padding:50px 40px;
  border-radius:20px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(25px) saturate(200%);
  -webkit-backdrop-filter: blur(25px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 0 40px rgba(0,255,170,0.2);
  text-align:center;
  animation: neonPulse 2.5s infinite alternate;
  transition:0.3s ease;
}
.card:hover{
  box-shadow: 0 0 60px #00ffaa, 0 0 120px #00c3ff;
  transform: translateY(-5px);
}
@keyframes neonPulse{
  0%{box-shadow:0 0 20px #00ffaa,0 0 40px #00c3ff;}
  100%{box-shadow:0 0 50px #00ffaa,0 0 100px #00c3ff;}
}

h1{ margin-bottom:10px; font-size:28px; letter-spacing:1px;}
.subtitle{ opacity:0.7; margin-bottom:30px; font-size:15px; }

/* Input Fields */
.input-box{ position:relative; margin-top:20px; }
.input-box input{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.02);
  color:white;
  outline:none;
  transition:0.3s ease;
  backdrop-filter: blur(12px);
}
.input-box input:focus{
  border:1px solid #00ffaa;
  box-shadow:0 0 15px #00ffaa;
}
.show{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:13px;
  color:#00ffaa;
}

/* Button */
button{
  width:100%;
  padding:15px;
  margin-top:25px;
  border:none;
  border-radius:12px;
  background: linear-gradient(135deg, rgba(0,255,170,0.3), rgba(0,195,255,0.3));
  backdrop-filter: blur(12px);
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s ease;
  animation: buttonGlow 2s infinite alternate;
}
button:hover{
  box-shadow:0 0 25px #00ffaa, 0 0 50px #00c3ff;
  transform:translateY(-2px);
}
@keyframes buttonGlow{
  0%{box-shadow:0 0 10px #00ffaa,0 0 20px #00c3ff;}
  100%{box-shadow:0 0 20px #00ffaa,0 0 40px #00c3ff;}
}

/* Messages */
#msg{
  margin-top:20px;
  padding:12px;
  border-radius:10px;
  font-size:14px;
  display:none;
}
.msg-error{ background:#ff4d4d33; color:#ff8080; }
.msg-success{ background:#00ffaa33; color:#6bffd6; }

/* Switch */
.switch{ margin-top:22px; font-size:14px; }
.switch a{ color:#00ffaa; text-decoration:none; }

</style>
</head>

<body>

<div class="light light1"></div>
<div class="light light2"></div>

<div class="card">
<h1>Welcome Back</h1>
<p class="subtitle">Login to your account</p>

<div class="input-box">
  <input id="email" placeholder="Email">
</div>

<div class="input-box">
  <input id="password" type="password" placeholder="Password">
  <span class="show" onclick="togglePass()">Show</span>
</div>

<button onclick="login()">Login</button>
<div id="msg"></div>

<p class="switch">
Don't have an account?
<a href="register.html">Register</a>
</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabaseClient = supabase.createClient(
"https://rcxjwetrmtwxkdqdurfw.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjeGp3ZXRybXR3eGtkcWR1cmZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDMyNzQsImV4cCI6MjA4ODQxOTI3NH0.WXzfjufXlpeHPZhNBiSShNd19eRNf_CtTrnMj7CNnf8"
);

function togglePass(){
  let pass=document.getElementById("password");
  pass.type = pass.type==="password" ? "text" : "password";
}

async function login(){
  let email=document.getElementById("email").value.trim();
  let password=document.getElementById("password").value.trim();
  let msg=document.getElementById("msg");

  if(email=="" || password==""){
    msg.style.display="block";
    msg.className="msg-error";
    msg.innerText="Enter email and password";
    return;
  }

  let {data,error}=await supabaseClient.auth.signInWithPassword({
    email:email,
    password:password
  });

  if(error){
    msg.style.display="block";
    msg.className="msg-error";
    msg.innerText=error.message;
  }else{
    localStorage.setItem("user","true");
    localStorage.setItem("email",email);
    msg.style.display="block";
    msg.className="msg-success";
    msg.innerText="Login successful...";
    setTimeout(()=>{ window.location="loading.html"; },1000);
  }
}
</script>
</body>
</html>
