<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOJI APIs | Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Poppins', sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050c);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.bg-shape {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  animation: float 10s ease-in-out infinite;
}

.shape1 {
  background: #00ffaa;
  top: -150px;
  left: -150px;
  opacity: 0.3;
}

.shape2 {
  background: #4f7cff;
  bottom: -150px;
  right: -150px;
  opacity: 0.3;
  animation-delay: -5s;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(50px, -50px) scale(1.1); }
}

.login-container {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 450px;
  padding: 20px;
}

.login-card {
  background: rgba(10, 15, 31, 0.7);
  backdrop-filter: blur(20px);
  border-radius: 32px;
  padding: 48px 40px;
  border: 1px solid rgba(0, 255, 170, 0.2);
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo h1 {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, #00ffaa, #4f7cff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.logo p {
  color: #8b9bb0;
  font-size: 14px;
  margin-top: 8px;
}

.input-group {
  margin-bottom: 24px;
}

.input-group label {
  display: block;
  margin-bottom: 8px;
  color: #cbd5e1;
  font-size: 13px;
  font-weight: 500;
}

.input-group input {
  width: 100%;
  padding: 14px 18px;
  background: rgba(20, 27, 45, 0.8);
  border: 1.5px solid rgba(0, 255, 170, 0.2);
  border-radius: 16px;
  color: white;
  font-size: 15px;
  transition: all 0.3s ease;
  outline: none;
}

.input-group input:focus {
  border-color: #00ffaa;
  box-shadow: 0 0 20px rgba(0, 255, 170, 0.2);
}

.password-wrapper {
  position: relative;
}

.password-wrapper input {
  padding-right: 70px;
}

.toggle-password {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #00ffaa;
  font-size: 12px;
  font-weight: 600;
  background: rgba(0, 255, 170, 0.1);
  padding: 5px 12px;
  border-radius: 20px;
  border: none;
}

.options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  font-size: 13px;
}

.remember {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #8b9bb0;
  cursor: pointer;
}

.remember input {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: #00ffaa;
}

.forgot {
  color: #00ffaa;
  text-decoration: none;
  cursor: pointer;
  background: none;
  border: none;
  font-size: 13px;
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #00ffaa, #4f7cff);
  border: none;
  border-radius: 16px;
  color: #03050c;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0, 255, 170, 0.3);
}

.register-link {
  text-align: center;
  margin-top: 28px;
  color: #8b9bb0;
  font-size: 14px;
}

.register-link a {
  color: #00ffaa;
  text-decoration: none;
  font-weight: 600;
  cursor: pointer;
}

.message {
  margin-top: 20px;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  display: none;
  text-align: center;
}

.message.error {
  background: rgba(255, 77, 77, 0.15);
  color: #ff8080;
  border: 1px solid rgba(255, 77, 77, 0.3);
  display: block;
}

.message.success {
  background: rgba(0, 255, 170, 0.15);
  color: #6bffd6;
  border: 1px solid rgba(0, 255, 170, 0.3);
  display: block;
}
</style>
</head>
<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <h1>TOJI APIs</h1>
      <p>Welcome back • Sign in to continue</p>
    </div>

    <div class="input-group">
      <label>📧 Email Address</label>
      <input type="email" id="email" placeholder="hello@toji.com">
    </div>

    <div class="input-group">
      <label>🔒 Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter your password">
        <button type="button" class="toggle-password" id="toggleBtn">Show</button>
      </div>
    </div>

    <div class="options">
      <label class="remember">
        <input type="checkbox" id="remember"> Remember me
      </label>
      <button type="button" class="forgot" id="forgotBtn">Forgot password?</button>
    </div>

    <button type="button" class="login-btn" id="loginBtn">Login</button>

    <div id="message" class="message"></div>

    <div class="register-link">
      Don't have an account?
      <a href="#" id="registerBtn">Create account</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
// Supabase Config
const _supabase = supabase.createClient(
  "https://rcxjwetrmtwxkdqdurfw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjeGp3ZXRybXR3eGtkcWR1cmZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDMyNzQsImV4cCI6MjA4ODQxOTI3NH0.WXzfjufXlpeHPZhNBiSShNd19eRNf_CtTrnMj7CNnf8"
);

// Get DOM elements
const emailField = document.getElementById('email');
const passwordField = document.getElementById('password');
const loginButton = document.getElementById('loginBtn');
const toggleButton = document.getElementById('toggleBtn');
const forgotButton = document.getElementById('forgotBtn');
const registerButton = document.getElementById('registerBtn');
const messageBox = document.getElementById('message');
const rememberBox = document.getElementById('remember');

// Toggle Password
toggleButton.onclick = function() {
  if (passwordField.type === 'password') {
    passwordField.type = 'text';
    toggleButton.textContent = 'Hide';
  } else {
    passwordField.type = 'password';
    toggleButton.textContent = 'Show';
  }
};

// Forgot Password
forgotButton.onclick = function() {
  alert('📧 Password reset link will be sent to your email');
};

// Register
registerButton.onclick = function() {
  alert('📝 Registration page coming soon!');
};

// Login Function
loginButton.onclick = async function() {
  const email = emailField.value.trim();
  const password = passwordField.value.trim();

  messageBox.className = 'message';
  messageBox.style.display = 'none';

  if (!email || !password) {
    messageBox.className = 'message error';
    messageBox.textContent = '❌ Please enter email and password';
    messageBox.style.display = 'block';
    return;
  }

  const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
  if (!emailRegex.test(email)) {
    messageBox.className = 'message error';
    messageBox.textContent = '❌ Invalid email format';
    messageBox.style.display = 'block';
    return;
  }

  loginButton.textContent = 'Logging in...';
  loginButton.disabled = true;

  try {
    const { data, error } = await _supabase.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      messageBox.className = 'message error';
      if (error.message.includes('Invalid login credentials')) {
        messageBox.textContent = '❌ Wrong email or password';
      } else if (error.message.includes('Email not confirmed')) {
        messageBox.textContent = '❌ Please confirm your email first';
      } else {
        messageBox.textContent = '❌ ' + error.message;
      }
      messageBox.style.display = 'block';
      loginButton.textContent = 'Login';
      loginButton.disabled = false;
    } else {
      localStorage.setItem('user', 'true');
      localStorage.setItem('email', email);
      
      if (rememberBox.checked) {
        localStorage.setItem('rememberEmail', email);
      } else {
        localStorage.removeItem('rememberEmail');
      }

      messageBox.className = 'message success';
      messageBox.textContent = '✅ Login successful! Redirecting...';
      messageBox.style.display = 'block';

      setTimeout(function() {
        window.location.href = 'loading.html';
      }, 1200);
    }
  } catch (err) {
    messageBox.className = 'message error';
    messageBox.textContent = '❌ Something went wrong';
    messageBox.style.display = 'block';
    loginButton.textContent = 'Login';
    loginButton.disabled = false;
  }
};

// Load saved email
const savedEmail = localStorage.getItem('rememberEmail');
if (savedEmail) {
  emailField.value = savedEmail;
  rememberBox.checked = true;
}

// Enter key support
passwordField.onkeypress = function(e) {
  if (e.key === 'Enter') {
    loginButton.click();
  }
};
emailField.onkeypress = function(e) {
  if (e.key === 'Enter') {
    loginButton.click();
  }
};
</script>
</body>
</html>
