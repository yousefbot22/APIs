<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جاري التحميل | TOJI APIs</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Inter', sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(145deg, #010214 0%, #0a0c1a 100%);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Glass Container */
.glass {
  background: rgba(15, 23, 42, 0.5);
  backdrop-filter: blur(15px);
  border-radius: 48px;
  padding: 50px 70px;
  text-align: center;
  border: 1px solid rgba(79, 70, 229, 0.3);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  transition: all 0.3s;
}

/* Rotating Border */
.rotating-border {
  position: relative;
  border-radius: 48px;
  background: linear-gradient(90deg, #4f46e5, #22c55e, #4f46e5);
  padding: 2px;
  animation: rotateBorder 3s linear infinite;
}

@keyframes rotateBorder {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

.inner {
  background: rgba(2, 6, 23, 0.9);
  border-radius: 46px;
  padding: 40px 60px;
}

/* Spinner */
.spinner {
  width: 70px;
  height: 70px;
  margin: 0 auto 25px;
  border: 3px solid rgba(79, 70, 229, 0.2);
  border-top-color: #4f46e5;
  border-right-color: #22c55e;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Title */
.title {
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(135deg, #4f46e5, #22c55e);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 10px;
}

/* Subtitle */
.subtitle {
  color: #94a3b8;
  font-size: 14px;
  margin-bottom: 25px;
}

/* Status Bar */
.status-bar {
  width: 250px;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  margin: 20px auto;
  overflow: hidden;
}

.status-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #4f46e5, #22c55e);
  border-radius: 10px;
  animation: fill 2.2s ease forwards;
}

@keyframes fill {
  0% { width: 0%; }
  50% { width: 65%; }
  100% { width: 100%; }
}

/* Status Text */
.status-text {
  color: #22c55e;
  font-size: 13px;
  margin-top: 15px;
  font-weight: 500;
}

/* Pulse Dot */
.pulse-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: #22c55e;
  border-radius: 50%;
  margin-right: 8px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.2); }
}
</style>
</head>
<body>

<div class="glass">
  <div class="inner">
    <div class="spinner"></div>
    <div class="title">TOJI APIs</div>
    <div class="subtitle">منصة الواجهات البرمجية</div>
    
    <div class="status-bar">
      <div class="status-fill"></div>
    </div>
    
    <div class="status-text">
      <span class="pulse-dot"></span>
      <span id="statusMsg">جاري التحميل</span>
    </div>
  </div>
</div>

<script>
const statusMessages = [
  "جاري التحميل",
  "تهيئة البيئة",
  "تحميل الواجهات",
  "جاهز للانطلاق"
];

let idx = 0;
const statusSpan = document.getElementById('statusMsg');

const interval = setInterval(() => {
  idx = (idx + 1) % statusMessages.length;
  statusSpan.textContent = statusMessages[idx];
}, 700);

setTimeout(() => {
  clearInterval(interval);
  window.location.href = "dashboard.html";
}, 2500);
</script>
</body>
</html>
