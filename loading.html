<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جاري التحميل | TOJI APIs</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Poppins', sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at 20% 50%, #0f172a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* Floating Orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.4;
  animation: floatOrb 6s ease-in-out infinite;
}

.orb1 { width: 300px; height: 300px; background: #4f46e5; top: 20%; left: 10%; }
.orb2 { width: 400px; height: 400px; background: #22c55e; bottom: 10%; right: 5%; animation-delay: -2s; }
.orb3 { width: 200px; height: 200px; background: #06b6d4; top: 60%; left: 70%; animation-delay: -4s; }

@keyframes floatOrb {
  0%, 100% { transform: translateY(0) translateX(0); }
  50% { transform: translateY(-40px) translateX(20px); }
}

/* Main Card */
.card {
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(20px);
  border-radius: 32px;
  padding: 50px 60px;
  text-align: center;
  border: 1px solid rgba(79, 70, 229, 0.4);
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  z-index: 10;
  animation: slideUp 0.6s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Dots Loader */
.dots-loader {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin: 30px 0;
}

.dot {
  width: 16px;
  height: 16px;
  background: linear-gradient(135deg, #4f46e5, #22c55e);
  border-radius: 50%;
  animation: bounce 0.6s ease-in-out infinite;
}

.dot:nth-child(1) { animation-delay: 0s; }
.dot:nth-child(2) { animation-delay: 0.1s; }
.dot:nth-child(3) { animation-delay: 0.2s; }
.dot:nth-child(4) { animation-delay: 0.3s; }
.dot:nth-child(5) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-20px) scale(1.2); }
}

/* Wave Text */
.wave-text {
  font-size: 18px;
  color: #cbd5e1;
  margin-top: 20px;
}

.wave-text span {
  display: inline-block;
  animation: wave 1s ease-in-out infinite;
  animation-delay: calc(0.1s * var(--i));
}

@keyframes wave {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* Loading Message */
.message {
  font-size: 14px;
  color: #94a3b8;
  margin-top: 25px;
}

/* Glow Effect */
.glow {
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(135deg, #4f46e5, #22c55e);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">
  <div class="glow">TOJI APIs</div>
  
  <div class="dots-loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  
  <div class="wave-text">
    <span style="--i:1">ج</span>
    <span style="--i:2">ا</span>
    <span style="--i:3">ر</span>
    <span style="--i:4">ي</span>
    <span style="--i:5"> </span>
    <span style="--i:6">ا</span>
    <span style="--i:7">ل</span>
    <span style="--i:8">ت</span>
    <span style="--i:9">ح</span>
    <span style="--i:10">م</span>
    <span style="--i:11">ي</span>
    <span style="--i:12">ل</span>
  </div>
  
  <div class="message" id="message">⚡ تهيئة البيئة</div>
</div>

<script>
const messages = [
  "⚡ تهيئة البيئة",
  "🔗 جلب البيانات",
  "✨ تجهيز الواجهات",
  "🚀 التشغيل النهائي"
];

let msgIndex = 0;
const msgEl = document.getElementById('message');

setInterval(() => {
  msgIndex = (msgIndex + 1) % messages.length;
  msgEl.textContent = messages[msgIndex];
}, 800);

setTimeout(() => {
  window.location.href = "dashboard.html";
}, 3000);
</script>
</body>
</html>
