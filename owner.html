<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SONG DEV | Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    :root {
      --neon: #00bfff;
      --bg: #050b14;
      --card: #0a1628;
      --text: #e6f7ff;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #08162b, var(--bg));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    .title {
      font-size: 32px;
      margin-bottom: 10px;
      color: var(--neon);
      text-shadow: 0 0 12px rgba(0,191,255,.7);
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 25px;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 25px 15px;
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(0,191,255,.25);
      transition: 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(0,191,255,.15),
        transparent
      );
      transform: translateX(-100%);
      transition: 0.6s;
    }

    .card:hover::before {
      transform: translateX(100%);
    }

    .card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 0 25px rgba(0,191,255,.35);
    }

    .icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 15px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--neon);
      border: 2px solid var(--neon);
      box-shadow: 0 0 15px rgba(0,191,255,.5);
    }

    .label {
      font-size: 18px;
      margin-bottom: 6px;
    }

    .small {
      font-size: 13px;
      opacity: 0.7;
      word-break: break-all;
    }

    .back {
      margin-top: 40px;
    }

    .back a {
      color: var(--neon);
      text-decoration: none;
      border: 1px solid var(--neon);
      padding: 10px 22px;
      border-radius: 30px;
      transition: 0.3s;
    }

    .back a:hover {
      background: var(--neon);
      color: #001018;
      box-shadow: 0 0 18px rgba(0,191,255,.7);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="title">Contact the Developer</div>
    <div class="subtitle">SONG DEV official contact links</div>

    <div class="grid">

      <a class="card" href="https://wa.me/201201786764" target="_blank">
        <div class="icon"><i class="fab fa-whatsapp"></i></div>
        <div class="label">WhatsApp</div>
        <div class="small">wa.me/201201786764</div>
      </a>

      <a class="card" href="https://www.facebook.com/profile.php?id=61585877146655" target="_blank">
        <div class="icon"><i class="fab fa-facebook-f"></i></div>
        <div class="label">Facebook</div>
        <div class="small">facebook.com</div>
      </a>

      <a class="card" href="https://whatsapp.com/channel/0029VbBBbFQ42DciVzLFpd0V" target="_blank">
        <div class="icon"><i class="fab fa-whatsapp"></i></div>
        <div class="label">WhatsApp Channel</div>
        <div class="small">Official channel</div>
      </a>

      <a class="card" href="https://www.youtube.com/@SONG-elyoutuber" target="_blank">
        <div class="icon"><i class="fab fa-youtube"></i></div>
        <div class="label">YouTube</div>
        <div class="small">@SONG-elyoutuber</div>
      </a>

      <a class="card" href="mailto:youualla020@gmail.com">
        <div class="icon"><i class="fas fa-envelope"></i></div>
        <div class="label">Gmail</div>
        <div class="small">youualla020@gmail.com</div>
      </a>

    </div>

    <div class="back">
      <a href="dashboard.html">Back to Platform</a>
    </div>
  </div>

</body>
</html>
